<ion-header class="ion-no-border">
  <ion-toolbar class="page-toolbar">
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="goBack()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ 'lookbook' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" [disabled]="busy" (click)="openSaveMenu()">
        @if (saving || exporting) {
          <ion-spinner class="lb-editor-save-spin" name="crescent"></ion-spinner>
        } @else {
          <ion-icon slot="icon-only" name="save-outline"></ion-icon>
        }
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content lb-editor-content" [scrollY]="true">
  @if (loading) {
    <div class="lb-editor-center"><ion-spinner></ion-spinner></div>
  } @else {
    <div class="lb-editor">
      <label class="lb-editor__field">
        <span class="lb-editor__label">{{ 'lookbookDocTitle' | translate }}</span>
        <input
          class="lb-editor__input"
          type="text"
          [(ngModel)]="title"
          [placeholder]="'lookbook' | translate"
        />
      </label>

      <app-lookbook-pm-editor
        #editor
        [html]="contentHtml"
        [documentTitle]="title"
        [disabled]="busy"
        [placeholder]="'lookbookEditorPlaceholder' | translate"
        (htmlChange)="onHtmlChange($event)"
        (requestPhoto)="openInsertMenu()"
        (requestTemplate)="openTemplateMenu()"
      />
    </div>
  }
</ion-content>

@if (uploading) {
  <div class="lb-editor-upload" role="status" aria-live="polite">
    <div class="lb-editor-upload__card">
      <ion-spinner name="crescent"></ion-spinner>
      <span>{{ 'lookbookUploadingPhoto' | translate }}</span>
    </div>
  </div>
}
